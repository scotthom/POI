<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Historical Explorer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1614;
    --parchment: #f5f0e8;
    --aged: #e8dfc8;
    --sepia: #8b6914;
    --rust: #9b3a2a;
    --sage: #4a6741;
    --surface: #111009;
    --surface-deep: #0d0b08;
    --border: rgba(245,240,232,0.08);
    --text-dim: rgba(245,240,232,0.4);
    --text-dimmer: rgba(245,240,232,0.25);
    --locate-blue: #1a73e8;
    --locate-gray: #5f6368;
    --header-h: 52px;
  }

  html, body {
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    color: var(--parchment);
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* ─── HEADER BANNER ─────────────────────────────────── */
  #app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    z-index: 500;
    background: rgba(17,16,9,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px 0 20px;
    gap: 12px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: var(--aged);
    line-height: 1;
  }

  .header-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ─── MAP ────────────────────────────────────────────── */
  #map {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0; bottom: 0;
    z-index: 1;
    background: #111;
  }

  .leaflet-tile { filter: brightness(0.55) saturate(0.6); }

  /* ─── LOCATE BUTTON (map overlay) ───────────────────── */
  #locateBtn {
    position: fixed;
    z-index: 400;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    background: white;
    color: #3c4043;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
  }

  /* collapsed: icon-only circle */
  #locateBtn.state-collapsed {
    bottom: 148px;
    right: 14px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    padding: 0;
    justify-content: center;
  }

  /* expanded: pill with label */
  #locateBtn.state-expanded {
    bottom: calc(var(--sheet-peek) + 14px);
    right: 14px;
    height: 36px;
    border-radius: 18px;
    padding: 0 14px 0 10px;
    font-size: 13px;
  }

  #locateBtn .loc-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  #locateBtn .loc-label {
    white-space: nowrap;
  }

  /* icon color states */
  #locateBtn.loc-inactive .loc-icon { color: var(--locate-gray); }
  #locateBtn.loc-active   .loc-icon { color: var(--locate-blue); }
  #locateBtn.loc-denied   .loc-icon { color: var(--locate-gray); }

  /* ─── DESKTOP SIDEBAR (≥768px) ──────────────────────── */
  @media (min-width: 768px) {
    :root { --header-h: 56px; }

    #map {
      right: 360px;
    }

    #locateBtn {
      /* on desktop: always in map area, collapsed style */
      bottom: 24px !important;
      right: 376px !important;
      width: 40px !important;
      height: 40px !important;
      border-radius: 50% !important;
      padding: 0 !important;
      justify-content: center !important;
      font-size: 0 !important;
    }

    #locateBtn .loc-label { display: none; }

    #bottom-sheet {
      display: none !important;
    }

    #desktop-sidebar {
      display: flex !important;
    }
  }

  /* ─── DESKTOP SIDEBAR ───────────────────────────────── */
  #desktop-sidebar {
    display: none;
    position: fixed;
    top: var(--header-h);
    right: 0;
    width: 360px;
    bottom: 0;
    z-index: 300;
    background: var(--surface);
    border-left: 1px solid var(--border);
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-status {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    min-height: 52px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .sites-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(139,105,20,0.3) transparent;
  }

  .narration-panel {
    border-top: 1px solid var(--border);
    background: var(--surface-deep);
    padding: 18px 22px;
    min-height: 160px;
    max-height: 280px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  /* ─── BOTTOM SHEET (mobile) ──────────────────────────── */
  :root {
    --sheet-peek: 120px;
    --sheet-mid: 52vh;
    --sheet-full: calc(100dvh - var(--header-h) - 20px);
  }

  #bottom-sheet {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    z-index: 300;
    background: var(--surface);
    border-radius: 14px 14px 0 0;
    box-shadow: 0 -2px 20px rgba(0,0,0,0.5);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* height is viewport minus header; we translate to reveal different amounts */
    height: var(--sheet-full);
    transform: translateY(calc(var(--sheet-full) - var(--sheet-peek)));
    will-change: transform;
    touch-action: none;
  }

  #bottom-sheet.sheet-mid {
    transform: translateY(calc(var(--sheet-full) - var(--sheet-mid)));
  }

  #bottom-sheet.sheet-open {
    transform: translateY(0);
  }

  /* drag handle */
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(245,240,232,0.2);
    border-radius: 2px;
    margin: 10px auto 0;
    flex-shrink: 0;
    cursor: grab;
  }

  .sheet-status {
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    min-height: 44px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .sheet-sites {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: rgba(139,105,20,0.3) transparent;
  }

  .sheet-narration {
    border-top: 1px solid var(--border);
    background: var(--surface-deep);
    padding: 16px 18px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex-shrink: 0;
    max-height: 240px;
  }

  /* ─── SHARED CARD / DETAIL STYLES ──────────────────── */
  .site-card {
    padding: 15px 22px;
    border-bottom: 1px solid rgba(245,240,232,0.05);
    cursor: pointer;
    transition: background 0.15s;
  }

  .site-card:active,
  .site-card:hover { background: rgba(245,240,232,0.04); }

  .site-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    color: var(--sepia);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }

  .site-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--aged);
    line-height: 1.3;
  }

  /* ─── DETAIL VIEW ────────────────────────────────────── */
  .detail-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .detail-view.visible { display: flex; }

  .detail-back {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    background: none;
    border-left: none; border-right: none; border-top: none;
    color: var(--sepia);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: opacity 0.15s;
    width: 100%;
    text-align: left;
  }

  .detail-back:hover { opacity: 0.7; }

  .detail-back svg {
    width: 14px; height: 14px;
    flex-shrink: 0;
  }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--aged);
    line-height: 1.25;
  }

  .detail-play-btn {
    background: var(--sepia);
    border: none;
    color: var(--ink);
    width: 70%;
    height: 42px;
    border-radius: 21px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    align-self: center;
    transition: background 0.15s;
    box-shadow: 0 2px 10px rgba(139,105,20,0.4);
    flex-shrink: 0;
  }

  .detail-play-btn:hover,
  .detail-play-btn:active { background: #a87a1a; }

  .detail-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.75;
    color: rgba(245,240,232,0.82);
  }

  .empty-state {
    padding: 28px 22px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: rgba(245,240,232,0.18);
    line-height: 1.6;
  }

  /* ─── ANIMATIONS ─────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 1.5px solid rgba(245,240,232,0.15);
    border-top-color: var(--sepia);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .pulse {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--sepia);
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 8px;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .speaking-indicator {
    display: inline-flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
    margin-left: 4px;
  }

  .speaking-indicator span {
    display: inline-block;
    width: 3px;
    background: var(--sepia);
    border-radius: 1px;
    animation: wave 1.2s ease-in-out infinite;
  }

  .speaking-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .speaking-indicator span:nth-child(3) { animation-delay: 0.3s; }
  .speaking-indicator span:nth-child(4) { animation-delay: 0.45s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 12px; }
  }

  /* you marker on map */
  .you-marker {
    background: var(--rust);
    border: 2px solid white;
    border-radius: 50%;
    width: 14px; height: 14px;
    box-shadow: 0 0 0 4px rgba(155,58,42,0.25);
  }
</style>
</head>
<body>

<!-- ── HEADER BANNER ─────────────────────────────────────── -->
<header id="app-header">
  <svg class="header-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="14" cy="14" r="13" fill="rgba(139,105,20,0.15)" stroke="rgba(139,105,20,0.4)" stroke-width="1"/>
    <path d="M14 6C10.69 6 8 8.69 8 12c0 4.5 6 10 6 10s6-5.5 6-10c0-3.31-2.69-6-6-6zm0 8.5c-1.38 0-2.5-1.12-2.5-2.5S12.62 9.5 14 9.5s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="var(--sepia)"/>
  </svg>
  <div>
    <div class="header-title">Historical Explorer</div>
    <div class="header-subtitle">Nearby places with stories</div>
  </div>
</header>

<!-- ── MAP ───────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── LOCATE BUTTON ─────────────────────────────────────── -->
<button id="locateBtn" class="state-collapsed loc-inactive" onclick="locateMe()" title="Find my location" aria-label="Find my location">
  <!-- target/crosshair icon — swapped to slashed when denied -->
  <svg id="locIconActive" class="loc-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
    <circle cx="12" cy="12" r="3" fill="currentColor"/>
    <line x1="12" y1="2" x2="12" y2="6"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="2"  y1="12" x2="6"  y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  <svg id="locIconDenied" class="loc-icon" style="display:none" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8" stroke-dasharray="3 2"/>
    <line x1="12" y1="2" x2="12" y2="6"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="2"  y1="12" x2="6"  y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4" y1="4" x2="20" y2="20"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </svg>
  <span class="loc-label" id="locLabel">Your location</span>
</button>

<!-- ── MOBILE BOTTOM SHEET ───────────────────────────────── -->
<div id="bottom-sheet" aria-label="Nearby sites panel">
  <div class="sheet-handle" id="sheetHandle"></div>

  <div class="sheet-status" id="mobileStatus">
    Press the locate button to discover nearby history.
  </div>

  <!-- List view -->
  <div class="sheet-sites" id="mobileSitesList">
    <div class="empty-state">Your historical sites will appear here once located.</div>
  </div>

  <!-- Detail view -->
  <div class="detail-view" id="mobileDetail">
    <button class="detail-back" onclick="showList('mobile')">
      <svg viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All sites
    </button>
    <div class="detail-body">
      <div class="detail-title" id="mobileDetailTitle"></div>
      <button class="detail-play-btn" id="mobilePlayBtn" onclick="toggleSpeech()">&#9654; Play</button>
      <div class="detail-text" id="mobileDetailText"></div>
    </div>
  </div>
</div>

<!-- ── DESKTOP SIDEBAR ───────────────────────────────────── -->
<div id="desktop-sidebar">
  <div class="sidebar-status" id="desktopStatus">
    Press "Find My Location" to discover nearby history.
  </div>

  <!-- List view -->
  <div class="sites-list" id="desktopSitesList">
    <div class="empty-state">Your historical sites will appear here once located.</div>
  </div>

  <!-- Detail view -->
  <div class="detail-view" id="desktopDetail">
    <button class="detail-back" onclick="showList('desktop')">
      <svg viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All sites
    </button>
    <div class="detail-body">
      <div class="detail-title" id="desktopDetailTitle"></div>
      <button class="detail-play-btn" id="desktopPlayBtn" onclick="toggleSpeech()">&#9654; Play</button>
      <div class="detail-text" id="desktopDetailText"></div>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────
let map, userMarker, siteMarkers = [];
let currentSites = [], currentNarration = "", isSpeaking = false;
let userLat, userLng;
let activeIndex = -1;
let locationGranted = false;

// ── MOBILE DETECT ────────────────────────────────────────────
const isMobile = () => window.innerWidth < 768;

// ── MAP INIT ─────────────────────────────────────────────────
map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18
}).addTo(map);

// Zoom control — top-right on desktop, hidden on mobile (pinch to zoom)
L.control.zoom({ position: 'topright' }).addTo(map);

// ── BOTTOM SHEET DRAG ─────────────────────────────────────────
const sheet = document.getElementById('bottom-sheet');
const handle = document.getElementById('sheetHandle');
let dragStartY = 0, dragStartTranslate = 0, isDragging = false;

function getTranslate() {
  const t = new DOMMatrix(getComputedStyle(sheet).transform);
  return t.m42; // translateY
}

function snapSheet(direction) {
  // direction: 'up' | 'mid' | 'down'
  sheet.classList.remove('sheet-mid', 'sheet-open');
  if (direction === 'open') sheet.classList.add('sheet-open');
  else if (direction === 'mid') sheet.classList.add('sheet-mid');
  updateLocateBtnPosition(direction);
}

function updateLocateBtnPosition(sheetState) {
  if (!isMobile()) return;
  const btn = document.getElementById('locateBtn');
  if (sheetState === 'down') {
    btn.classList.remove('state-expanded');
    btn.classList.add('state-collapsed');
    btn.style.bottom = '148px';
  } else {
    btn.classList.remove('state-collapsed');
    btn.classList.add('state-expanded');
    // pill floats above the peek of mid/open sheet
    const peekPx = sheetState === 'mid'
      ? window.innerHeight * 0.52
      : (window.innerHeight - 52 - 20);
    btn.style.bottom = (peekPx + 14) + 'px';
  }
}

handle.addEventListener('touchstart', e => {
  isDragging = true;
  dragStartY = e.touches[0].clientY;
  dragStartTranslate = getTranslate();
  sheet.style.transition = 'none';
}, { passive: true });

handle.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dy = e.touches[0].clientY - dragStartY;
  const newT = Math.max(0, dragStartTranslate + dy);
  sheet.style.transform = `translateY(${newT}px)`;
}, { passive: true });

handle.addEventListener('touchend', e => {
  isDragging = false;
  sheet.style.transition = '';
  const finalT = getTranslate();
  const sheetH = sheet.offsetHeight;
  const peekH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sheet-peek'));
  const midH = window.innerHeight * 0.52;

  // Snap logic: where did user release?
  if (finalT < sheetH * 0.25) {
    snapSheet('open');
  } else if (finalT < sheetH - peekH * 1.5) {
    snapSheet('mid');
  } else {
    snapSheet('down');
  }
}, { passive: true });

// ── STATUS HELPERS ───────────────────────────────────────────
function setStatus(html) {
  document.getElementById('mobileStatus').innerHTML = html;
  document.getElementById('desktopStatus').innerHTML = html;
}

// ── LOCATE BUTTON STATE ──────────────────────────────────────
function setLocateState(state) {
  // state: 'inactive' | 'active' | 'denied' | 'loading'
  const btn = document.getElementById('locateBtn');
  const label = document.getElementById('locLabel');
  const iconActive = document.getElementById('locIconActive');
  const iconDenied = document.getElementById('locIconDenied');

  btn.classList.remove('loc-inactive', 'loc-active', 'loc-denied');

  if (state === 'denied') {
    btn.classList.add('loc-denied');
    iconActive.style.display = 'none';
    iconDenied.style.display = '';
    label.textContent = 'Location denied';
  } else if (state === 'active') {
    btn.classList.add('loc-active');
    iconActive.style.display = '';
    iconDenied.style.display = 'none';
    label.textContent = 'Your location';
  } else {
    btn.classList.add('loc-inactive');
    iconActive.style.display = '';
    iconDenied.style.display = 'none';
    label.textContent = 'Your location';
  }
}

// ── LOCATE ───────────────────────────────────────────────────
async function locateMe() {
  // If already have location, just re-center
  if (locationGranted && userLat && userLng) {
    map.setView([userLat, userLng], 15);
    return;
  }

  setStatus('<span class="spinner"></span>Requesting your location…');
  setLocateState('inactive');

  if (!navigator.geolocation) {
    setStatus('Geolocation not supported by your browser.');
    setLocateState('denied');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => onLocation(pos.coords.latitude, pos.coords.longitude),
    err => {
      setStatus(`Location denied. Enable location for this site and try again.`);
      setLocateState('denied');
    },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

async function onLocation(lat, lng) {
  userLat = lat; userLng = lng;
  locationGranted = true;
  setLocateState('active');

  if (userMarker) map.removeLayer(userMarker);
  const youIcon = L.divIcon({
    className: '',
    html: '<div class="you-marker"></div>',
    iconSize: [14,14], iconAnchor: [7,7]
  });
  userMarker = L.marker([lat, lng], { icon: youIcon })
    .addTo(map)
    .bindPopup('<b>You are here</b>');
  map.setView([lat, lng], 14);

  // On mobile, expand sheet to mid on first locate
  if (isMobile()) snapSheet('mid');

  setStatus('<span class="spinner"></span>Searching Wikipedia for nearby history…');

  try {
    const sites = await fetchNearbySites(lat, lng);
    if (sites.length === 0) {
      setStatus('No historical sites found within 5 km.');
      return;
    }
    currentSites = sites.slice(0, 3);
    renderSites();
    setStatus(`<span class="pulse"></span>Found ${currentSites.length} historical sites nearby`);
  } catch(e) {
    setStatus(`Error: ${e.message}`);
  }
}

// ── FETCH ────────────────────────────────────────────────────
async function fetchNearbySites(lat, lng) {
  const geoUrl = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=5000&gslimit=20&format=json&origin=*`;
  const geoData = await (await fetch(geoUrl)).json();
  const pages = geoData.query?.geosearch || [];
  if (pages.length === 0) return [];

  const topIds = pages.slice(0, 10).map(p => p.pageid).join('|');
  const extUrl = `https://en.wikipedia.org/w/api.php?action=query&pageids=${topIds}&prop=extracts|coordinates&exintro=1&exchars=800&format=json&origin=*`;
  const extData = await (await fetch(extUrl)).json();

  const enriched = pages.slice(0, 10).map(p => {
    const page = extData.query?.pages?.[p.pageid];
    const extract = page?.extract || '';
    const coords = page?.coordinates?.[0] || { lat: p.lat, lon: p.lon };
    return {
      id: p.pageid,
      title: p.title,
      extract: stripHtml(extract),
      lat: coords.lat,
      lon: coords.lon,
      dist: haversine(lat, lng, p.lat, p.lon)
    };
  }).filter(p => p.extract.length > 80);

  const hist = /historic|century|ancient|founded|built|war|battle|temple|church|castle|palace|monument|landmark|museum|heritage|ruins|coloni|empire|revolut|medieval|roman|greek|dynasty|archit/i;
  enriched.sort((a, b) => {
    const aS = (hist.test(a.title + a.extract) ? 1000 : 0) - a.dist;
    const bS = (hist.test(b.title + b.extract) ? 1000 : 0) - b.dist;
    return bS - aS;
  });
  return enriched.slice(0, 3);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180;
  const Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

// ── RENDER ───────────────────────────────────────────────────
function renderSites() {
  siteMarkers.forEach(m => map.removeLayer(m));
  siteMarkers = [];

  const mobileList = document.getElementById('mobileSitesList');
  const desktopList = document.getElementById('desktopSitesList');
  mobileList.innerHTML = '';
  desktopList.innerHTML = '';

  const colors = ['#8b6914', '#9b3a2a', '#4a6741'];
  const nums = ['I', 'II', 'III'];

  currentSites.forEach((site, i) => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${colors[i]};border:2px solid #f5f0e8;border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:20px;height:20px;cursor:pointer"></div>`,
      iconSize: [20,20], iconAnchor: [10,20], popupAnchor: [0,-22]
    });
    const marker = L.marker([site.lat, site.lon], { icon })
      .addTo(map)
      .bindPopup(`<strong>${site.title}</strong><br><small>${Math.round(site.dist)}m away</small>`);
    marker.on('click', () => selectSite(i));
    siteMarkers.push(marker);

    // Card — title + distance only
    const cardHtml = `
      <div class="site-num">${nums[i]}</div>
      <div class="site-name">${site.title}</div>
    `;

    const mCard = document.createElement('div');
    mCard.className = 'site-card';
    mCard.id = `mcard-${i}`;
    mCard.innerHTML = cardHtml;
    mCard.onclick = () => selectSite(i);
    mobileList.appendChild(mCard);

    const dCard = document.createElement('div');
    dCard.className = 'site-card';
    dCard.id = `dcard-${i}`;
    dCard.innerHTML = cardHtml;
    dCard.onclick = () => selectSite(i);
    desktopList.appendChild(dCard);
  });

  const bounds = L.latLngBounds(
    currentSites.map(s => [s.lat, s.lon]).concat([[userLat, userLng]])
  );
  map.fitBounds(bounds, { padding: [60, 60] });
}

// ── SELECT SITE — switch to detail view ───────────────────────
function selectSite(i) {
  stopSpeech();
  activeIndex = i;

  const site = currentSites[i];
  currentNarration = site.extract.slice(0, 800);

  map.setView([site.lat, site.lon], 15);
  siteMarkers[i]?.openPopup();

  // Populate both detail views
  ['mobile', 'desktop'].forEach(ctx => {
    document.getElementById(`${ctx}DetailTitle`).textContent = site.title;
    document.getElementById(`${ctx}DetailText`).textContent = currentNarration;
    document.getElementById(`${ctx}PlayBtn`).textContent = '\u25B6 Play';
  });

  // Show detail, hide list
  document.getElementById('mobileSitesList').style.display = 'none';
  document.getElementById('mobileDetail').classList.add('visible');
  document.getElementById('desktopSitesList').style.display = 'none';
  document.getElementById('desktopDetail').classList.add('visible');

  if (isMobile()) snapSheet('open');
}

// ── BACK TO LIST ─────────────────────────────────────────────
function showList(ctx) {
  stopSpeech();
  if (ctx === 'mobile' || ctx === 'both') {
    document.getElementById('mobileSitesList').style.display = '';
    document.getElementById('mobileDetail').classList.remove('visible');
    snapSheet('mid');
  }
  if (ctx === 'desktop' || ctx === 'both') {
    document.getElementById('desktopSitesList').style.display = '';
    document.getElementById('desktopDetail').classList.remove('visible');
  }
}

// ── TTS (chunked for iOS) ─────────────────────────────────────
let ttsChunks = [], ttsIndex = 0;

function chunkText(text, maxLen = 180) {
  // Split on sentence boundaries, keeping chunks under maxLen
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  const chunks = [];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > maxLen && current.length > 0) {
      chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

function toggleSpeech() {
  if (isSpeaking) { stopSpeech(); } else { startSpeech(); }
}

function startSpeech() {
  if (!currentNarration || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  ttsChunks = chunkText(currentNarration);
  ttsIndex = 0;
  isSpeaking = true;
  setSpeakingUI(true);
  speakChunk();
}

function speakChunk() {
  if (ttsIndex >= ttsChunks.length || !isSpeaking) {
    isSpeaking = false;
    setSpeakingUI(false);
    setVoiceLabel('Play again');
    return;
  }

  const utt = new SpeechSynthesisUtterance(ttsChunks[ttsIndex]);
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    /samantha|karen|daniel|moira|fiona|victoria|serena|google uk|google aus/i.test(v.name)
  ) || voices.find(v => v.lang.startsWith('en') && v.localService)
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];

  if (preferred) utt.voice = preferred;
  utt.rate = 0.88;
  utt.pitch = 0.95;
  utt.volume = 1;

  utt.onend = () => {
    ttsIndex++;
    // Small delay between chunks prevents iOS from cutting off
    setTimeout(speakChunk, 50);
  };

  utt.onerror = (e) => {
    if (e.error === 'interrupted') return; // user stopped
    isSpeaking = false;
    setSpeakingUI(false);
    setVoiceLabel('Error — try again');
  };

  window.speechSynthesis.speak(utt);
}

function stopSpeech() {
  window.speechSynthesis?.cancel();
  isSpeaking = false;
  ttsIndex = 0;
  setSpeakingUI(false);
  setVoiceLabel('Ready');
}

function setSpeakingUI(speaking) {
  ['mobilePlayBtn', 'desktopPlayBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = speaking ? '\u23F8 Stop' : '\u25B6 Play';
  });
}

function setVoiceLabel(text) {
  // no-op — label now lives inside the button text
}

// Voices may load async
if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', () => {});
}

// ── RESIZE: re-snap button on orientation change ──────────────
window.addEventListener('resize', () => {
  if (isMobile()) {
    const isOpen = sheet.classList.contains('sheet-open');
    const isMid = sheet.classList.contains('sheet-mid');
    updateLocateBtnPosition(isOpen ? 'open' : isMid ? 'mid' : 'down');
  }
});

// ── INIT ──────────────────────────────────────────────────────
// On mobile, start sheet in collapsed/peek position
if (isMobile()) {
  snapSheet('down');
  // set initial locate button bottom position
  document.getElementById('locateBtn').style.bottom = '148px';
}
</script>
